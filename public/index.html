<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Packaging | Gestión Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body>
    <div class="erp-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span style="font-size:24px;">🏭</span> <h2>ERP PRO v5</h2>
            </div>
            <nav class="sidebar-menu">
                <button class="menu-item activo" onclick="App.nav('vista-lista', this)">📊 Inventario</button>
                <button class="menu-item" onclick="App.nuevoTroquel()">➕ Alta Troquel</button>
                <button class="menu-item" onclick="App.nav('vista-historial', this); App.cargarHistorial()">📝 Historial Movimientos</button>
                <div class="menu-divisor"></div>
                <button class="menu-item" onclick="App.toggleScanner()">📷 Escáner Lotes</button>
            </nav>
        </aside>

        <main class="main-content">
            <section id="vista-lista" class="vista">
                <div class="header-modulo">
                    <div>
                        <h1>Control de Troqueles</h1>
                        <p style="color:#64748b; font-size:12px;">Gestión de Ubicaciones y Producción</p>
                    </div>
                    <div style="width: 400px; display:flex; gap:10px;">
                        <input type="text" id="buscador" placeholder="Buscar Matrícula, Ubicación, Nombre..." oninput="App.filtrar()" style="flex:1;">
                        <select id="filtro-estado" onchange="App.filtrar()" style="width:140px;">
                            <option value="TODOS">Todos</option>
                            <option value="EN ALMACEN">En Almacén</option>
                            <option value="EN PRODUCCION">En Producción</option>
                        </select>
                    </div>
                </div>

                <div id="panel-acciones" class="panel-acciones oculto" style="background:#e0f2fe; padding:10px; border-radius:6px; margin-bottom:15px; border:1px solid #0284c7; display:flex; align-items:center; gap:15px;">
                    <strong style="color:#0369a1;"><span id="contador-sel">0</span> seleccionados</strong>
                    <button class="btn-accion" style="background:#e11d48;" onclick="App.moverLote('SALIDA')">🏭 Sacar a Producción</button>
                    <button class="btn-accion" style="background:#16a34a;" onclick="App.moverLote('RETORNO')">✅ Devolver a Ubicación</button>
                    <button class="btn-secundario" onclick="App.limpiarSeleccion()">Cancelar</button>
                </div>

                <div class="contenedor-tabla">
                    <table class="tabla-pro">
                        <thead>
                            <tr>
                                <th width="30"><input type="checkbox" id="check-all" onclick="App.toggleAll(this)"></th>
                                <th>Estado</th>
                                <th>Matrícula</th>
                                <th>Ubicación</th>
                                <th>Descripción</th>
                                <th>Familia/Tipo</th>
                                <th width="100">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="vista-formulario" class="vista oculto">
                <div class="header-modulo">
                    <h1 id="titulo-form">Ficha Troquel</h1>
                    <button class="btn-secundario" onclick="App.nav('vista-lista')">Volver</button>
                </div>
                <div class="panel-formulario">
                    <form onsubmit="App.guardarFicha(event)">
                        <input type="hidden" id="f-id-db">
                        <div class="form-grid">
                            <div class="full-width" style="background:#f8fafc; padding:15px; border:1px solid #cbd5e1;">
                                <label style="color:#0f766e;">1. MATRÍCULA (QR INVARIABLE) *</label>
                                <input type="text" id="f-matricula" required style="font-weight:900; font-size:16px;">
                            </div>
                            <div class="full-width" style="background:#fff7ed; padding:15px; border:1px solid #fdba74;">
                                <label style="color:#c2410c;">2. UBICACIÓN FÍSICA *</label>
                                <input type="text" id="f-ubicacion" required style="font-weight:900; font-size:16px;">
                            </div>
                            
                            <div class="full-width"><label>Nombre / Descripción *</label><input type="text" id="f-nombre" required></div>
                            
                            <div><label>Categoría</label><select id="f-cat"></select></div>
                            <div><label>Familia</label><select id="f-fam"></select></div>
                            
                            <div class="full-width"><label>Artículos (Separar por comas)</label><textarea id="f-arts" rows="2"></textarea></div>
                            <div><label>OT Referencia</label><input type="text" id="f-ot"></div>
                            <div><label>Medidas</label><input type="text" id="f-medidas"></div>
                            
                            <div class="full-width"><label>Observaciones</label><textarea id="f-obs" rows="2"></textarea></div>
                        </div>
                        <div style="margin-top:20px; text-align:right;">
                            <button type="submit" class="btn-accion">💾 GUARDAR DATOS</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="vista-historial" class="vista oculto">
                <div class="header-modulo"><h1>Registro de Movimientos</h1></div>
                <div class="contenedor-tabla">
                    <table class="tabla-pro">
                        <thead><tr><th>Fecha</th><th>Troquel</th><th>Acción</th><th>Origen > Destino</th></tr></thead>
                        <tbody id="tabla-historial"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-scanner" class="modal oculto">
        <div class="modal-contenido" style="width:600px; max-width:95%;">
            <h2>📸 Escáner de Lotes</h2>
            <div id="reader" style="width:100%; height:300px; background:#000;"></div>
            
            <div style="margin-top:15px; padding:10px; background:#f1f5f9; border-radius:4px;">
                <strong>Troqueles Leídos:</strong>
                <div id="lista-escaneados" style="display:flex; gap:5px; flex-wrap:wrap; margin-top:5px;"></div>
            </div>

            <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                <button class="btn-accion" style="background:#e11d48;" onclick="App.procesarEscaneo('SALIDA')">🏭 A Producción</button>
                <button class="btn-accion" style="background:#16a34a;" onclick="App.procesarEscaneo('RETORNO')">✅ Retornar</button>
                <button class="btn-secundario" onclick="App.toggleScanner(false)">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
