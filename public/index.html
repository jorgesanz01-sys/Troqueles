<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Packaging | Gestión de Troqueles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body>
    <div class="erp-layout">
        
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="logo-icon" style="font-size: 24px;">⚙️</span>
                <h2>SysPack ERP</h2>
            </div>
            <nav class="sidebar-menu">
                <button class="menu-item activo" onclick="cambiarVista('vista-lista', this)">
                    <span>📊</span> Inventario
                </button>
                <button class="menu-item" onclick="abrirVistaCrear(this)">
                    <span>➕</span> Nuevo Troquel
                </button>
                <button class="menu-item" onclick="cambiarVista('vista-historial', this); cargarHistorial();">
                    <span>🕒</span> Historial / Logs
                </button>
                <div class="menu-divisor"></div>
                <button class="menu-item" onclick="iniciarEscaneo()">
                    <span>📷</span> Escanear QR
                </button>
            </nav>
        </aside>

        <main class="main-content">
            
            <section id="vista-lista" class="vista activa">
                <div class="header-modulo">
                    <h1>Inventario de Troqueles</h1>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button class="btn-secundario" onclick="exportarCSV()">📥 Excel</button>
                        
                        <div style="display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding-left: 10px;">
                            <span style="font-size: 11px; color: #94a3b8; font-weight: 700; margin-right: 5px;">IMPORTAR EN:</span>
                            <select id="select-tipo-importacion" style="border: none; background: transparent; font-family: 'Inter'; font-size: 13px; color: #1e293b; font-weight: 600; outline: none; cursor: pointer; max-width: 150px;">
                                <option value="TROQUELES NORMALES">Normales</option>
                                <option value="TROQUELES PEQUEÑOS">Pequeños</option>
                                <option value="CON EXPULSOR">Con Expulsor</option>
                                <option value="DESCATALOGADOS">Descatalogados</option>
                                <option value="OTROS">Otros...</option>
                            </select>
                            <input type="file" id="input-csv-import" accept=".csv" style="display: none;" onchange="subirCSV()">
                            <button class="btn-secundario" style="border: none; border-left: 1px solid #e2e8f0; border-radius: 0 8px 8px 0; margin-left: 5px; background-color: #f8fafc;" onclick="document.getElementById('input-csv-import').click()">
                                📤 Subir
                            </button>
                        </div>
                    </div>
                </div>

                <div class="filtros-chips" id="contenedor-chips">
                    <button class="chip activo" onclick="filtrarPorTipo('TODOS', this)">Todos los Tipos</button>
                    </div>

                <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center;">
                    
                    <div style="position: relative; min-width: 250px;">
                        <span style="position: absolute; left: 12px; top: 12px; pointer-events: none;">📂</span>
                        <select id="filtro-familia" onchange="filtrarPorFamilia(this)" style="width: 100%; padding: 12px 10px 12px 35px; border-radius: 8px; border: 1px solid #e2e8f0; outline: none; font-weight: 600; color: #475569; appearance: none; background: white; cursor: pointer;">
                            <option value="TODAS">Todas las Familias</option>
                            </select>
                        <span style="position: absolute; right: 12px; top: 14px; font-size: 10px; color: #94a3b8; pointer-events: none;">▼</span>
                    </div>

                    <div class="caja-buscador" style="flex-grow: 1;">
                        <span class="icono-lupa">🔍</span>
                        <input type="text" id="buscador" placeholder="Buscar por artículo, descripción, ubicación...">
                        <button id="btn-limpiar" class="btn-limpiar oculto" onclick="limpiarBuscador()">✕</button>
                    </div>
                </div>

                <div class="contenedor-tabla">
                    <table class="tabla-pro">
                        <thead>
                            <tr>
                                <th style="width: 40px; text-align: center;">
                                    <input type="checkbox" id="check-all" onclick="toggleAllChecks(this)">
                                </th>
                                <th onclick="ordenarPor('id')" class="sortable">ID Int. ↕️</th>
                                <th onclick="ordenarPor('ubicacion')" class="sortable">Ubicación ↕️</th>
                                <th onclick="ordenarPor('tipo')" class="sortable">Tipo ↕️</th>
                                <th onclick="ordenarPor('nombre')" class="sortable">Descripción ↕️</th>
                                <th onclick="ordenarPor('familia')" class="sortable">Familia ↕️</th>
                                <th onclick="ordenarPor('codigos_articulo')" class="sortable">Artículos ↕️</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-troqueles">
                            <tr><td colspan="8" class="text-center" style="padding:40px;">Cargando base de datos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="vista-formulario" class="vista oculto">
                <div class="header-modulo">
                    <h1 id="titulo-formulario">Alta de Nuevo Troquel</h1>
                    <button class="btn-secundario" onclick="document.querySelector('.menu-item').click()">Volver</button>
                </div>
                
                <div class="panel-formulario">
                    <form id="form-troquel">
                        <input type="hidden" id="input-id-db">
                        <div class="form-grid">
                            
                            <div class="form-group full-width" style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px dashed #cbd5e1;">
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                    <div>
                                        <label style="color: var(--primary);">Tipo de Troquel (Almacén) *</label>
                                        <div style="display: flex; gap: 8px;">
                                            <select id="input-categoria" required style="flex-grow: 1;"></select>
                                            <button type="button" class="btn-secundario btn-sm" onclick="crearEntidad('categorias')" title="Crear Tipo">+</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label style="color: var(--primary);">Ubicación (Número/Estantería) *</label>
                                        <input type="text" id="input-ubicacion" placeholder="Ej. 1, 50, A-1..." required style="border-color: var(--primary); font-weight: 800; font-size: 16px;">
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Familia de Producto (Desplegable)</label>
                                <div style="display: flex; gap: 8px;">
                                    <select id="input-familia" style="flex-grow: 1;"></select>
                                    <button type="button" class="btn-secundario btn-sm" onclick="crearEntidad('familias')" title="Crear Familia">+</button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Referencias OT</label>
                                <input type="text" id="input-ot">
                            </div>

                            <div class="form-group full-width">
                                <label>Descripción del Troquel *</label>
                                <input type="text" id="input-nombre" required>
                            </div>

                            <div class="form-group full-width">
                                <label>Códigos de Artículo (Campo Grande)</label>
                                <textarea id="input-articulos" rows="3" placeholder="Ej: 108657, 108658..."></textarea>
                            </div>

                            <div class="form-group">
                                <label>Medidas Troquel</label>
                                <input type="text" id="input-tamano-troquel">
                            </div>
                            <div class="form-group">
                                <label>Medidas Finales</label>
                                <input type="text" id="input-tamano-final">
                            </div>

                            <div class="form-group full-width">
                                <label>Enlace al Plano (URL)</label>
                                <input type="url" id="input-archivo">
                            </div>
                            <div class="form-group full-width">
                                <label>Observaciones</label>
                                <textarea id="input-observaciones" rows="2"></textarea>
                            </div>
                        </div>
                        
                        <div class="modal-botones">
                            <button type="button" class="btn-secundario" onclick="document.querySelector('.menu-item').click()">Cancelar</button>
                            <button type="submit" class="btn-accion">💾 Guardar Ficha</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="vista-historial" class="vista oculto">
                <div class="header-modulo"><h1>Auditoría</h1></div>
                <div class="contenedor-tabla">
                    <table class="tabla-pro">
                        <thead><tr><th>Fecha</th><th>Troquel</th><th>Acción</th></tr></thead>
                        <tbody id="lista-historial"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="barra-flotante" class="barra-acciones-bulk oculto">
        <span id="contador-seleccionados" style="font-weight: 600;">0 seleccionados</span>
        <div style="height: 20px; width: 1px; background: #475569; margin: 0 10px;"></div>
        
        <select id="bulk-categoria" class="select-bulk"><option value="">Asignar Tipo...</option></select>
        <button class="btn-accion btn-sm" style="background: white; color: black; margin-right: 10px;" onclick="aplicarBulk('categoria')">Aplicar</button>
        
        <select id="bulk-familia" class="select-bulk"><option value="">Asignar Familia...</option></select>
        <button class="btn-accion btn-sm" style="background: white; color: black;" onclick="aplicarBulk('familia')">Aplicar</button>
        
        <button class="btn-icono peligro btn-sm" style="background: #fef2f2; border:none; margin-left: 10px;" onclick="aplicarBulkBorrar()">🗑️ Borrar</button>
    </div>

    <div id="contenedor-camara" class="modal oculto">
        <div class="modal-contenido text-center">
            <h2>Escanear QR (ID Interno)</h2>
            <div id="reader" style="width:100%; margin-bottom:20px;"></div>
            <button onclick="detenerEscaneo()" class="btn-secundario">Cerrar</button>
        </div>
    </div>

    <div id="modal-qr" class="modal oculto">
        <div class="modal-contenido text-center">
            <h2 class="no-print" style="margin-bottom: 20px;">Vista Previa Godex</h2>
            <div id="zona-impresion" class="etiqueta-preview">
                <canvas id="qr-canvas"></canvas>
                <div class="etiqueta-info">
                    <div id="qr-texto-ubi" class="etiq-ubi"></div>
                    <div id="qr-texto-id" class="etiq-id"></div>
                    <div id="qr-texto-desc" class="etiq-desc"></div>
                </div>
            </div>
            <div class="modal-botones no-print" style="justify-content: center; margin-top: 25px;">
                <button type="button" class="btn-secundario" onclick="document.getElementById('modal-qr').classList.add('oculto')">Cerrar</button>
                <button type="button" class="btn-accion" onclick="window.print()">🖨️ Imprimir</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
