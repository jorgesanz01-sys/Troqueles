<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Packaging | V7 Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body>
    <div class="erp-layout">
        <aside class="sidebar">
            <div class="sidebar-logo"><span>🏭</span><h2>ERP V7</h2></div>
            <nav class="sidebar-menu">
                <button class="menu-item activo" onclick="App.nav('vista-lista', this)">📊 Inventario</button>
                <button class="menu-item" onclick="App.nuevoTroquel()">➕ Nuevo Troquel</button>
                <button class="menu-item" onclick="App.nav('vista-historial', this); App.cargarHistorial()">📝 Historial</button>
                <div class="menu-divisor"></div>
                <button class="menu-item" onclick="App.toggleScanner()">📷 Escáner Lotes</button>
            </nav>
        </aside>

        <main class="main-content">
            <section id="vista-lista" class="vista">
                <div class="header-modulo">
                    <h1>Inventario</h1>
                    <button class="btn-secundario" onclick="App.exportarCSV()">📥 Excel</button>
                </div>

                <div class="filtros-chips" id="chips-tipos"></div>
                
                <div style="display:flex; gap:15px; margin-bottom:15px; align-items:center;">
                    <select id="filtro-familia" onchange="App.filtrar()" style="width:200px; padding:8px;">
                        <option value="TODAS">Todas las Familias</option>
                    </select>
                    
                    <select id="filtro-estado" onchange="App.filtrar()" style="width:150px; padding:8px;">
                        <option value="TODOS">Todos Estados</option>
                        <option value="EN ALMACEN">En Almacén</option>
                        <option value="EN PRODUCCION">En Producción</option>
                        <option value="DESCATALOGADO">Descatalogados</option>
                    </select>

                    <div class="caja-buscador" style="flex:1; position:relative;">
                        <input type="text" id="buscador" placeholder="Buscar..." oninput="App.filtrar()" style="width:100%; padding-right:30px;">
                        <button id="btn-limpiar" onclick="App.limpiarBuscador()" class="oculto" style="position:absolute; right:5px; top:5px; border:none; background:transparent; cursor:pointer;">✕</button>
                    </div>
                </div>

                <div id="panel-acciones" class="panel-acciones oculto" style="background:#e0f2fe; padding:10px; border-radius:6px; margin-bottom:15px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <strong style="color:#0369a1;"><span id="contador-sel">0</span> sel.</strong>
                    
                    <button class="btn-accion" style="background:#e11d48;" onclick="App.moverLote('SALIDA')">🏭 A Prod.</button>
                    <button class="btn-accion" style="background:#16a34a;" onclick="App.moverLote('RETORNO')">✅ Devolver</button>
                    
                    <div style="width:1px; height:20px; background:#93c5fd; margin:0 5px;"></div>

                    <select id="bulk-familia" class="select-bulk" style="color:black; background:white; border:1px solid #93c5fd;">
                        <option value="">Asignar Familia...</option>
                    </select>
                    <button class="btn-secundario" onclick="App.asignarMasivo('familia')">OK</button>

                    <select id="bulk-tipo" class="select-bulk" style="color:black; background:white; border:1px solid #93c5fd;">
                        <option value="">Asignar Tipo...</option>
                    </select>
                    <button class="btn-secundario" onclick="App.asignarMasivo('categoria')">OK</button>

                    <div style="flex-grow:1;"></div>
                    <button class="btn-secundario" onclick="App.limpiarSeleccion()">Cancelar</button>
                </div>

                <div class="contenedor-tabla">
                    <table class="tabla-pro">
                        <thead>
                            <tr>
                                <th width="30"><input type="checkbox" id="check-all" onclick="App.toggleAll(this)"></th>
                                <th width="40">Img</th>
                                <th onclick="App.ordenar('id_troquel')" style="cursor:pointer;">Matrícula ↕️</th>
                                <th onclick="App.ordenar('ubicacion')" style="cursor:pointer;">Ubicación ↕️</th>
                                <th onclick="App.ordenar('nombre')" style="cursor:pointer;">Descripción ↕️</th>
                                <th onclick="App.ordenar('categoria')" style="cursor:pointer;">Tipo ↕️</th>
                                <th onclick="App.ordenar('familia')" style="cursor:pointer;">Familia ↕️</th>
                                <th width="140">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="vista-formulario" class="vista oculto">
                <div class="header-modulo">
                    <h1 id="titulo-form">Ficha Troquel</h1>
                    <button class="btn-secundario" onclick="App.nav('vista-lista')">Volver</button>
                </div>
                <div class="panel-formulario">
                    <form onsubmit="App.guardarFicha(event)">
                        <input type="hidden" id="f-id-db">
                        <div class="form-grid">
                            
                            <div class="full-width" style="background:#f0fdf4; padding:15px; border:1px solid #86efac; border-radius:4px;">
                                <label style="color:#15803d; font-weight:900;">1. TIPO DE TROQUEL (Calcula Matrícula)</label>
                                <select id="f-cat" required onchange="App.calcularSiguienteId()" style="font-weight:bold; border:2px solid #16a34a;"></select>
                            </div>

                            <div>
                                <label>Matrícula (Automática)</label>
                                <input type="text" id="f-matricula" required style="font-weight:900; background:#eee;" readonly>
                            </div>
                            <div>
                                <label>Ubicación Actual</label>
                                <input type="text" id="f-ubicacion" required style="font-weight:900;">
                            </div>

                            <div class="full-width" style="text-align:center; padding:15px; border:2px dashed #cbd5e1; background:#f8fafc;">
                                <div id="preview-container" style="margin-bottom:10px;"></div>
                                <input type="hidden" id="f-foto-url">
                                
                                <label class="btn-secundario" style="cursor:pointer; display:inline-block; padding:10px 20px;">
                                    📎 Subir Foto o PDF
                                    <input type="file" accept="image/*,.pdf" capture="environment" onchange="App.subirArchivo(this)" style="display:none;">
                                </label>
                            </div>

                            <div class="full-width"><label>Descripción / Nombre *</label><input type="text" id="f-nombre" required></div>
                            
                            <div>
                                <label>Familia</label>
                                <div style="display:flex; gap:5px;">
                                    <select id="f-fam" style="flex:1;"></select>
                                    <button type="button" class="btn-secundario" onclick="App.crearFamilia()" title="Nueva Familia">+</button>
                                </div>
                            </div>
                            
                            <div><label>OT Referencia</label><input type="text" id="f-ot"></div>
                            <div><label>Medidas Madera</label><input type="text" id="f-medidas-madera"></div>
                            <div><label>Medidas Corte</label><input type="text" id="f-medidas-corte"></div>
                            
                            <div class="full-width"><label>Artículos</label><textarea id="f-arts" rows="2"></textarea></div>
                            <div class="full-width"><label>Observaciones</label><textarea id="f-obs" rows="2"></textarea></div>
                        </div>
                        <div style="margin-top:20px; text-align:right;">
                            <button type="button" class="btn-secundario" onclick="App.nav('vista-lista')">Cancelar</button>
                            <button type="submit" class="btn-accion">💾 GUARDAR</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="vista-historial" class="vista oculto">
                <div class="header-modulo"><h1>Historial</h1></div>
                <div class="contenedor-tabla"><table class="tabla-pro"><thead><tr><th>Fecha</th><th>Troquel</th><th>Acción</th><th>Detalle</th></tr></thead><tbody id="tabla-historial"></tbody></table></div>
            </section>
        </main>
    </div>

    <div id="modal-scanner" class="modal oculto">
        <div class="modal-contenido">
            <h2>Escáner Lotes</h2>
            <div id="reader"></div>
            <div id="lista-escaneados" style="margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;"></div>
            <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
                <button class="btn-accion" onclick="App.procesarEscaneo('SALIDA')">🏭 Salida</button>
                <button class="btn-accion" style="background:#16a34a;" onclick="App.procesarEscaneo('RETORNO')">✅ Entrada</button>
                <button class="btn-secundario" onclick="App.toggleScanner(false)">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="modal-qr" class="modal oculto">
        <div class="modal-contenido text-center" style="width:auto;">
            <div id="zona-impresion" class="etiqueta-preview">
                <canvas id="qr-canvas"></canvas>
                <div class="etiqueta-info">
                    <div id="qr-texto-ubi" class="etiq-ubi"></div>
                    <div id="qr-texto-id" class="etiq-id"></div>
                    <div id="qr-texto-desc" class="etiq-desc"></div>
                </div>
            </div>
            <div class="modal-botones no-print" style="justify-content:center; margin-top:20px;">
                <button class="btn-secundario" onclick="document.getElementById('modal-qr').classList.add('oculto')">Cerrar</button>
                <button class="btn-accion" onclick="window.print()">🖨️ Imprimir</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
