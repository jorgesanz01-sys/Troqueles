<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Packaging | Gestión de Troqueles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <main class="contenido-principal">
            <header class="cabecera-pro">
                <div class="cabecera-top">
                    <div class="logo-titulo">
                        <div class="logo-box">⚙️</div>
                        <div>
                            <h1>Inventario de Troqueles</h1>
                            <p class="subtitulo">Sistema de Gestión de Packaging</p>
                        </div>
                    </div>
                    <div class="acciones-top">
                        <button onclick="abrirModalFormulario()" class="btn-accion btn-nuevo">➕ Nuevo Troquel</button>
                        <button id="btn-scan" onclick="iniciarEscaneo()" class="btn-accion btn-scan">📷 Escanear QR</button>
                    </div>
                </div>

                <div class="cabecera-bottom">
                    <div class="caja-buscador">
                        <span class="icono-lupa">🔍</span>
                        <input type="text" id="buscador" placeholder="Buscar por código, descripción, notas...">
                        <button id="btn-limpiar" class="oculto">✕</button>
                    </div>
                    <div class="filtros-chips" id="contenedor-chips">
                        <button class="chip activo" onclick="filtrarPorChip('TODOS', this)">Todos</button>
                    </div>
                </div>

                <div id="contenedor-camara" class="oculto tarjeta-camara">
                    <div id="reader"></div>
                    <button onclick="detenerEscaneo()" class="btn-secundario mt-2">Cerrar Cámara</button>
                </div>
            </header>

            <section class="contenedor-tabla">
                <table class="tabla-pro">
                    <thead>
                        <tr>
                            <th onclick="ordenarPor('id_troquel')" class="sortable">Código <span class="icono-orden">↕️</span></th>
                            <th onclick="ordenarPor('nombre')" class="sortable">Descripción <span class="icono-orden">↕️</span></th>
                            <th onclick="ordenarPor('familia')" class="sortable">Familia <span class="icono-orden">↕️</span></th>
                            <th onclick="ordenarPor('ubicacion')" class="sortable">Ubicación <span class="icono-orden">↕️</span></th>
                            <th>Medidas (Trq / Fin)</th>
                            <th onclick="ordenarPor('observaciones')" class="sortable">Observaciones <span class="icono-orden">↕️</span></th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-troqueles">
                        <tr><td colspan="7" class="text-center"><div class="spinner inline"></div> Cargando...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="modal-formulario" class="modal oculto">
        <div class="modal-contenido">
            <h2 id="modal-titulo">Dar de alta Troquel</h2>
            <form id="form-troquel">
                <input type="hidden" id="input-id-db">
                <div class="form-grid">
                    <div class="form-group"><label>Código ID *</label><input type="text" id="input-id" required></div>
                    <div class="form-group"><label>Familia / Categoría *</label><select id="input-categoria" required><option value="">Seleccionar...</option></select></div>
                    <div class="form-group full-width"><label>Descripción del Troquel *</label><input type="text" id="input-nombre" required></div>
                    <div class="form-group full-width"><label>Ubicación Física *</label><input type="text" id="input-ubicacion" required></div>
                    <div class="form-group"><label>Tamaño Troquel</label><input type="text" id="input-tamano-troquel"></div>
                    <div class="form-group"><label>Tamaño Final Trabajo</label><input type="text" id="input-tamano-final"></div>
                    <div class="form-group full-width"><label>Observaciones</label><textarea id="input-observaciones" rows="2"></textarea></div>
                </div>
                <div class="modal-botones">
                    <button type="button" class="btn-secundario" onclick="cerrarModalFormulario()">Cancelar</button>
                    <button type="submit" class="btn-accion btn-nuevo">💾 Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-qr" class="modal oculto">
        <div class="modal-contenido text-center" id="zona-impresion">
            <h2 class="no-print">Etiqueta de Producción</h2>
            <canvas id="qr-canvas"></canvas>
            <h3 id="qr-texto-id" style="font-size: 24px; letter-spacing: 2px;"></h3>
            <div class="modal-botones no-print" style="justify-content: center;">
                <button type="button" class="btn-secundario" onclick="cerrarModalQR()">Cerrar</button>
                <button type="button" class="btn-accion btn-scan" onclick="window.print()">🖨️ Imprimir</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
